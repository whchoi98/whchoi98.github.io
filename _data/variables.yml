default:
  text_skin: dark
  highlight_theme: tomorrow-night-eighties
  lang: en
  paths:
    root: /
    home: /
    archive: /archive.html
    rss: /feed.xml
  mathjax: false
  mathjax_autoNumber: false
  mermaid: true
  chart: false
  toc:
    selectors: "h1,h2,h3"
  sources: unpkg

  page:
    mode: normal
    type: webpage
    article_header:
      align: left
      theme: dark
    articles:
      show_cover: true
      show_excerpt: true
      show_readmore: true
      show_info: true
    show_title: true
    show_edit_on_github: false
