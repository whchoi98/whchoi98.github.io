title: WooHyung Choi Tech Blog
description: AWS Solutions Architect's Workshop & Tech Notes
baseurl: ""
url: "https://whchoi98.github.io"

remote_theme: just-the-docs/just-the-docs

permalink: pretty

color_scheme: light

search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s\-/]+/
  rel_url: true
  button: false
  focus_shortcut_key: "k"

heading_anchors: true
enable_copy_code_button: true
back_to_top: true
back_to_top_text: "Back to top"

mermaid:
  version: "10.9.0"

nav_enabled: true
nav_sort: case_sensitive

aux_links:
  "GitHub":
    - "https://github.com/whchoi98"
aux_links_new_tab: true

footer_content: 'Copyright &copy; 2026 WooHyung Choi. Powered by <a href="https://just-the-docs.com">Just the Docs</a>.'

last_edit_timestamp: true
last_edit_time_format: "%b %e, %Y"

gh_edit_link: true
gh_edit_link_text: "Edit this page on GitHub"
gh_edit_repository: "https://github.com/whchoi98/whchoi98.github.io"
gh_edit_branch: "main"
gh_edit_view_mode: "tree"

callouts:
  highlight:
    color: yellow
  important:
    title: Important
    color: blue
  new:
    title: New
    color: green
  note:
    title: Note
    color: purple
  warning:
    title: Warning
    color: red
  tip:
    title: Tip
    color: green

plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-include-cache
  - jekyll-sitemap

kramdown:
  syntax_highlighter_opts:
    block:
      line_numbers: false

compress_html:
  clippings: all
  comments: all
  endings: all
  startings: []
  blanklines: false
  profile: false

defaults:
  - scope:
      path: "docs"
      type: "pages"
    values:
      layout: "default"

exclude:
  - .sass-cache/
  - .jekyll-cache/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/
  - "*.gem"
  - "*.gemspec"
  - LICENSE
  - README.md
