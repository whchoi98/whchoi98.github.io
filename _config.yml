# TeXt Theme Configuration
# https://github.com/kitian616/jekyll-TeXt-theme

## => Site Settings
##############################
text_skin: dark # "default", "dark", "forest", "ocean", "chocolate", "orange"
highlight_theme: tomorrow-night-eighties # "default", "tomorrow", "tomorrow-night", "tomorrow-night-eighties", "tomorrow-night-blue", "tomorrow-night-bright"
url: https://whchoi98.github.io
baseurl: ""
title: WooHyung Choi Tech Blog
description: >
  AWS Solutions Architect's Workshop & Tech Notes -
  AIML, Container, AWS Core, Cloud Security, Observability

## => Language and Timezone
##############################
lang: en
timezone: Asia/Seoul

## => Author and Social
##############################
author:
  type: person
  name: WooHyung Choi
  url: https://github.com/whchoi98
  avatar: /assets/img/avatar.png
  bio: AWS Solutions Architect
  email: whchoi98@gmail.com
  github: whchoi98
  linkedin: # your linkedin username

## => GitHub Repository
##############################
repository: whchoi98/whchoi98.github.io
repository_tree: main

## => Paths
##############################
paths:
  root: /
  home: /
  archive: /archive.html
  rss: /feed.xml

## => Post
##############################
excerpt_separator: <!--more-->
license: CC-BY-NC-4.0

## TOC
toc:
  selectors: "h1,h2,h3"

## => Markdown Enhancements
##############################
mathjax: false
mathjax_autoNumber: false
mermaid: true
chart: false

## => Paginate
##############################
paginate: 8
paginate_path: /page:num

## => Sources
##############################
sources: unpkg

## => Sharing
##############################
sharing:
  provider: false

## => Comments
##############################
comments:
  provider: false

## => Pageview
##############################
pageview:
  provider: false

## => Search
##############################
search:
  provider: default

## => Analytics
##############################
analytics:
  provider: false

## => Build
##############################
markdown: kramdown
highlighter: rouge
permalink: date

remote_theme: kitian616/jekyll-TeXt-theme

exclude:
  - CHANGELOG.md
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - README.md
  - /docs
  - /node_modules
  - /vendor

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: article
      sharing: true
      license: true
      aside:
        toc: true
      show_edit_on_github: false
      show_subscribe: true
      pageview: true

## => Plugins
##############################
plugins:
  - jekyll-remote-theme
  - jekyll-feed
  - jekyll-paginate
  - jekyll-sitemap
  - jemoji
