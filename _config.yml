theme: jekyll-theme-chirpy

lang: en

timezone: Asia/Seoul

title: WooHyung Choi Tech Blog

tagline: AWS Solutions Architect's Workshop & Tech Notes

description: >-
  A technical blog covering AWS workshops, AIML, Container, Cloud Security,
  and Observability topics by whchoi98.

url: "https://whchoi98.github.io"

github:
  username: whchoi98

social:
  name: whchoi98
  email: whchoi98@gmail.com
  links:
    - https://github.com/whchoi98

analytics:
  google:
    id:

theme_mode: dark

avatar: /assets/img/avatar.png

toc: true

disqus:
  comments: false

paginate: 10

kramdown:
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
      toc: true
      permalink: /posts/:title/
  - scope:
      path: _tabs
      type: tabs
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - "*.config.js"
  - package*.json

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
